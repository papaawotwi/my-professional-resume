name: Build And Push to ECR

on:
  push:
    branches: ['main']

jobs:
  build_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v7    

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Build Docker Image
        run: docker build -t 214277676835.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest .
 
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with: 
          image-ref: 214277676835.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest 
          format: table 
          exit-code: 0
          ignore-unfixed: true 
          severity: CRITICAL,HIGH

    
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4 # More information on this action can be found below in the 'AWS Credentials' section
        with:
          role-to-assume: arn:aws:iam::214277676835:role/github-action-role
          aws-region: aws-region-1
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

